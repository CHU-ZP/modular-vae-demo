name: smoke-test

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CPU dependencies
        run: |
          uv venv
          uv pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          uv pip install numpy PyYAML matplotlib tqdm
      - name: Compile package
        run: uv run --no-sync python -m compileall vae
      - name: Run smoke test
        run: uv run --no-sync python scripts/smoke_test.py
